  edit "US ZIP Code"
    set regex "^(?!00000)(?<zip>(?<zip5>\\d{5})(?:[ -](?=\\d))?(?<zip4>\\d{4})?)$"
    set description "This regex validates US zip codes. Matches all zip codes of exactly 5 digits except 00000. Optionally, matches zip5+zip4 where zip5 is exactly 5 digits, zip4 is exactly 4 digits, and zip5 and zip4 are, optionally, separated by a single space or hyphen. Captures zip5 and zip4 to named groups to facilitate program manipulation. Matches 12345 | 123456789 | 12345-6789 Non-Matches 123456."
  next
  edit "US State Name and Abbrev."
    set regex "(?i)^(Alabama|Alaska|Arizona|Arkansas|California|Colorado|Connecticut|Delaware|Florida|Georgia|Hawaii|Idaho|Illinois|Indiana|Iowa|Kansas|Kentucky|Louisiana|Maine|Maryland|Massachusetts|Michigan|Minnesota|Minnesota|Mississippi|Missouri|Montana|Nebraska|Nevada|New Hampshire|(New[ ]*(Jersey|Mexico|York))|North[ ]*(Carolina|Dakota)|Ohio|Oklahoma|Oregon|Pennsylvania|Rhode[ ]*Island|South[ ]*(Carolina|Dakota)|Tennessee|Texas|Utah|Vermont|Virginia|Washington|West[ ]*Virginia|Wisconsin|Wyoming|AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY)$"
    set description "This regex validates 50 US States\'s Name and Abbrev, case insensitive. Matches California | NewYork | North Carolina | AL."
  next
  edit "US Street Address"
    set regex "(?i)(\\d{1,4} [\\w\\s]{1,20}(?:street|st|avenue|ave|road|rd|highway|hwy|square|sq|traill|trl|drive|dr|court|ct|parkway|pkwy)\\W?(?=\\s|$))"
    set description "This regex validates a US Street Address. Matches 123 Lincoln Avenu | 123 West Main St | 12345 Via De La Rosa Non-Matches Lincoln Avenu."
  next
  edit "UK Vehicle Registration"
    set regex "^([A-HK-PRSVWY][A-HJ-PR-Y])\\s?([0][2-9]|[1-9][0-9])\\s?[A-HJ-PR-Z]{3}$"
    set description "This regex validates a UK vehicle registration system currently in use (as defined by the DVLA and put into effect from September 2001, and therefore does not allow registrations prior to this date). Matches AB51DVL | AB 51 DVL Non-Matches AB-51-DVL."
  next
  edit "UK Bank Sort Code"
    set regex "^(\\d){2}-(\\d){2}-(\\d){2}$"
    set description "This regex validates the format of a UK bank sort code. Matches 20-40-36 | 50-25-48 | 45-85-66 Non-Matches 204036."
  next
  edit "Post Office Box"
    set regex "^((p|P)[\\s|\\.|,]*|(post|P(ost|OST))[\\s|\\.]*)((o|O)[\\s|\\.|,]*|((o|O)(ff(ice)?)?|O(FF(ICE)?)?)\\b[\\s|\\.]*)(box|B(ox|OX))"
    set description "This regex validates a Post Office Box. Matches P. O. Box | p.o. box | PO Box | po box Non-Matches office box."
  next
  edit "Chinese ID card"
    set regex "(^\\d{15}$)|(^\\d{18}$)|(^\\d{17}(\\d|X|x)$)"
    set description "This regex validates a Chinese ID card number. Matches 2064d355-c0b9-41d8-9ef7-9d8b26524751 | 2064D355-C0B9-41D8-9EF7-9D8B26524751 Non-Matches 2064D355."
  next
  edit "Chinese phone"
    set regex "^(?<national>\\+?(?:86)?)(?<separator>\\s?-?)(?<phone>(?<vender>(13|15|18)[0-9])(?<area>\\d{4})(?<id>\\d{4}))$"
    set description "This regex validates a Chinese telphone number. Matches 86 13512341234 | +86 15812341234 | 86 13612341234 Non-Matches 14012341234."
  next
  edit "Australian Phone"
    set regex "(?<local1300>^1300[ |\\-]{0,1}\\d{3}[ |\\-]{0,1}\\d{3}$)|(?<tollcall>^1900|1902[ |\\-]{0,1}\\d{3}[ |\\-]{0,1}\\d{3}$)|(?<freecall>^1800[ |\\-]{0,1}\\d{3}[ |\\-]{0,1}\\d{3}$)|(?<standard>^\\({0,1}0[2|3|7|8]{1}\\){0,1}[ \\-]{0,1}\\d{4}[ |\\-]{0,1}\\d{4}$)|(?<international>^\\+?61[ |\\-]{0,1}[2|3|7|8]{1}[ |\\-]{0,1}[0-9]{4}[ |\\-]{0,1}[0-9]{4}$)|(?<local13>^13\\d{4}$)|(?<mobile>^04\\d{2,3}\\d{6}$)"
    set description "This regex validates a Australian telephone number, most Australian telephone numbers including 13, 1300, 1800, 1900, std and international +61- format numbers. It allows optional spaces, dashes and brackets in most cases. Matches 1300 123 123 | 1300123123 | +61212341234 | (02) 1234-1234 | 02 1234 1234 Non-Matches 1400123123."
  next
  edit "Canadian Postal Code"
    set regex "^[ABCEGHJKLMNPRSTVXYabceghjklmnprstvxy]\\d[ABCEGHJKLMNPRSTVWXYZabceghjklmnprstvwxyz]( )?\\d[ABCEGHJKLMNPRSTVWXYZabceghjklmnprstvwxyz]\\d$"
    set description "Canadian Postal Code format is (A1A 1X1) or (a1a 1x1). Its made up of two parts. Forward Sortation Area (FSA) and Local Delivery Unit (LDU). Read more on wikipedia. The letters D, F, I, O, Q, or U are not used on postal Code. Matches  M1R 4B0 | L0R 1B1 | L0R1B9 Non-Matches MDR 4B0."
  next
end
